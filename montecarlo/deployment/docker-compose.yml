version: '3.9'

services:
  # PostgreSQL 15 + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ravinala_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ravinala}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: ${DB_NAME:-market_data}
      POSTGRES_INITDB_ARGS: "-c max_wal_size=2GB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ravinala"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ravinala_network

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: ravinala_redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy volatile-ttl
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ravinala_network

  # FastAPI Backend
  backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile.backend
    container_name: ravinala_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ravinala:ravinala@postgres:5432/ravinala
      REDIS_URL: redis://redis:6379/0
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      LOG_LEVEL: INFO
      DEBUG: "false"
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - ravinala_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ../../ravinala-web
      dockerfile: ../montecarlo/deployment/Dockerfile.frontend
    container_name: ravinala_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "5173:5173"
    networks:
      - ravinala_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ravinala_network:
    driver: bridge
